// ---- Səhifələmə (Firestore read limitini azaltmaq üçün: hər tabda max 10 qaimə, lazım olanda çəkilir) ----
const PAGE_SIZE = 10;
let pg = {};
async function pgLoad(key, whereFn, page){
  if(!pg[key]) pg[key] = {cursors:[null], mode:null, page:1};
  const st = pg[key]; st.wf = whereFn; st.page = page = page||st.page||1;
  try{
    if(st.mode==='fallback') throw 0;
    for(let p=1;p<=page;p++){
      if(st.cursors[p]!==undefined) continue;
      let q = whereFn().orderBy('createdAt','desc').limit(PAGE_SIZE);
      if(st.cursors[p-1]) q = whereFn().orderBy('createdAt','desc').startAfter(st.cursors[p-1]).limit(PAGE_SIZE);
      const snap = await q.get();
      st.cursors[p] = snap.docs.length ? snap.docs[snap.docs.length-1] : (st.cursors[p-1]||null);
      if(p===page) st.rows = snap.docs.map(d=>({id:d.id,...d.data()}));
    }
    if(st.total==null){ try{ const c = await whereFn().count().get(); st.total = c.data().count; }catch(e){ st.total=st.rows?st.rows.length:0; } }
    st.mode = 'index';
  }catch(e){
    if(e) console.warn('Pagination indeksi yoxdur, ehtiyat rejiminə keçildi:', e);
    if(!st.all){
      const snap = await whereFn().get();
      st.all = snap.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>(b.createdAt?.toMillis?.()||0)-(a.createdAt?.toMillis?.()||0));
    }
    st.total = st.all.length;
    st.mode = 'fallback';
    st.rows = st.all.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
  }
  render();
}
function pgGoto(key, page){ pgLoad(key, pg[key].wf, page); }
function pgButtons(key){
  const st = pg[key];
  if(!st || !st.total || st.total<=PAGE_SIZE) return '';
  const pages = Math.ceil(st.total/PAGE_SIZE);
  let h = '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px">';
  for(let i=1;i<=pages;i++) h+=`<button class="${st.page===i?'':'sec'}" style="padding:4px 10px" onclick="pgGoto('${key}',${i})">${i}</button>`;
  return h+'</div>';
}
function searchList(key, whereFn, search, extraFilter){
  if(!pg[key] || pg[key].mode!=='search'){
    if(!pg[key]){ pg[key] = {mode:'search'}; whereFn().get().then(snap=>{ pg[key].all = snap.docs.map(d=>({id:d.id,...d.data()})); render(); }); }
  }
  let list = (pg[key] && pg[key].all) || [];
  if(extraFilter) list = list.filter(extraFilter);
  const s = search.toLowerCase();
  list = list.filter(q=> String(q.no).includes(search) || (q.kimUcun||'').toLowerCase().includes(s) || (q.anbar||'').toLowerCase().includes(s));
  return list.slice().sort((a,b)=>(b.createdAt?.toMillis?.()||0)-(a.createdAt?.toMillis?.()||0));
}

const IDB_NAME='qaimeOffline', IDB_STORE='pending';
function idbOpen(){ return new Promise((res,rej)=>{ const req=indexedDB.open(IDB_NAME,1); req.onupgradeneeded=()=>req.result.createObjectStore(IDB_STORE,{keyPath:'localId'}); req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); }
async function idbPut(rec){ const d=await idbOpen(); return new Promise((res,rej)=>{ const tx=d.transaction(IDB_STORE,'readwrite'); tx.objectStore(IDB_STORE).put(rec); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); }); }
async function idbDelete(id){ const d=await idbOpen(); return new Promise((res,rej)=>{ const tx=d.transaction(IDB_STORE,'readwrite'); tx.objectStore(IDB_STORE).delete(id); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); }); }
async function idbAll(){ const d=await idbOpen(); return new Promise((res,rej)=>{ const req=d.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).getAll(); req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); }
async function loadPending(){ pendingQaimeler = (await idbAll()).filter(r=>r.qType==='istehsalat'); render(); trySendAll(); }
async function trySendOne(rec){
  if(!rec) return false;
  if(inFlight.has(rec.localId)) return false;
  inFlight.add(rec.localId);
  try{
    const already = await db.collection('qaimeler').where('localId','==', rec.localId).limit(1).get();
    if(!already.empty){
      await idbDelete(rec.localId);
      pendingQaimeler = pendingQaimeler.filter(x=>x.localId!==rec.localId);
      pg={}; statsData=null;
      render();
      return true;
    }
    const wm = [`Sifarişçi: ${rec.sifarisVeren}`, `Anbar: ${rec.anbar}`, `Kim üçün: ${rec.kimUcun}`, `Ödəniş: ${rec.odenisTipi}`];
    const photos = await Promise.all(rec.files.map(async f=>{ const blob = await compressImage(f, 1200, 0.7, wm); return uploadToCloudinary(blob); }));
    const no = await db.runTransaction(async t=>{
      const ref = db.collection('meta').doc('counter');
      const snap = await t.get(ref);
      const val = (snap.exists? snap.data().value:0)+1;
      t.set(ref,{value:val});
      return val;
    });
    const ref = await db.collection('qaimeler').add({
      no, localId: rec.localId, sifarisVeren: rec.sifarisVeren, anbar: rec.anbar, kimUcun: rec.kimUcun, kimUcunId: rec.kimUcunId||null, odenisTipi: rec.odenisTipi, qeyd: rec.qeyd,
      tecili: rec.tecili, photos, photosUploading:false, status:'yeni', isleyen:null, problem:null,
      medaxilPhotos: [], medaxilPhotosUploading:false, qType:'istehsalat',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(), medaxilNo:null
    });
    if(rec.kimUcunId) sendPushToKorUser(db, rec.kimUcunId, 'Yeni sifariş', `Qaimə_${no} sizin üçün qeydə alındı.`);
    await idbDelete(rec.localId);
    pendingQaimeler = pendingQaimeler.filter(x=>x.localId!==rec.localId);
    const mineCache = pg['ist_mine'];
    pg={}; statsData=null;
    if(mineCache){
      const newQ = { id:ref.id, no, localId:rec.localId, sifarisVeren:rec.sifarisVeren, anbar:rec.anbar, kimUcun:rec.kimUcun, kimUcunId:rec.kimUcunId||null, odenisTipi:rec.odenisTipi, qeyd:rec.qeyd, tecili:rec.tecili, photos, photosUploading:false, status:'yeni', isleyen:null, problem:null, medaxilPhotos:[], medaxilPhotosUploading:false, qType:'istehsalat', createdAt:new Date(), medaxilNo:null };
      mineCache.rows = [newQ, ...(mineCache.rows||[])];
      if(mineCache.all) mineCache.all = [newQ, ...mineCache.all];
      if(mineCache.total!=null) mineCache.total++;
      pg['ist_mine'] = mineCache;
    }
    render();
    return true;
  }catch(e){ console.error(e); return false; }
  finally{ inFlight.delete(rec.localId); }
}
async function trySendAll(){
  if(sending || !navigator.onLine) return;
  sending = true;
  for(const rec of [...pendingQaimeler]){ await trySendOne(rec); }
  sending = false;
}
window.addEventListener('online', trySendAll);
setInterval(trySendAll, 8000);

function setNav(n){ curNav=n; render(); }

function fmtDate(ts){ if(!ts) return ''; const d = ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString('az-AZ')+' '+d.toLocaleTimeString('az-AZ',{hour:'2-digit',minute:'2-digit'}); }
function isToday(ts){ if(!ts) return false; const d=ts.toDate?ts.toDate():new Date(ts); const t=new Date(); return d.toDateString()===t.toDateString(); }
function daysAgo(ts){ if(!ts) return 0; const d=ts.toDate?ts.toDate():new Date(ts); return (Date.now()-d.getTime())/86400000; }
function isTecili(q){ return q.status!=='medaxil' && q.tecili===true; }
function hasOpenProblem(q){ return q.problem && !q.problem.solved; }
function statusLabel(s){ return s==='yeni'?'Yeni':(s==='islemede'?'İşlənir':(s==='sorgu'?'Sorğuda':(s==='tesdiqlenib'?'Təsdiq edilib':'Mədaxil edildi'))); }

function render(){
  const af = document.activeElement;
  const afId = af && af.id, afStart = af && af.selectionStart, afEnd = af && af.selectionEnd;
  document.querySelectorAll('#navTabs button').forEach(b=>b.classList.toggle('active', b.dataset.n===curNav));
  const mineBtn = document.querySelector('#navTabs button[data-n="mine"]');
  if(mineBtn) mineBtn.innerHTML = 'Mənim Qaimlərim' + (pendingQaimeler.length?` <span class="badge">${pendingQaimeler.length}</span>`:'');
  const m = document.getElementById('main');
  if(curNav==='add'){ if(!document.getElementById('f_anbar')) m.innerHTML = viewAddForm(); }
  else if(curNav==='mine') m.innerHTML = viewMine();
  else if(curNav==='sorgu') m.innerHTML = viewSorgu();
  else if(curNav==='tesdiqlenib') m.innerHTML = viewTesdiqlenib();
  else if(curNav==='medaxiledilib') m.innerHTML = viewMedaxilEdilib();
  else m.innerHTML = viewStats();
  if(afId){ const el=document.getElementById(afId); if(el && el.focus){ el.focus(); if(afStart!=null && el.setSelectionRange) try{el.setSelectionRange(afStart,afEnd);}catch(e){} } }
}

function viewSorgu(){
  const search = document.getElementById('sorguSearch')?.value || '';
  const wf = ()=> db.collection('qaimeler').where('status','==','sorgu');
  let list, pager='';
  if(search){ list = searchList('ist_sorgu_search', wf, search); }
  else{ if(!pg['ist_sorgu']) pgLoad('ist_sorgu', wf); list = (pg['ist_sorgu']&&pg['ist_sorgu'].rows)||[]; pager = pgButtons('ist_sorgu'); }
  reviewQaimeler = list;
  return `<div class="card"><h3>Sorğu</h3>
    <input id="sorguSearch" placeholder="Axtar (kim üçün / qaimə № / anbar)" value="${search}" oninput="render()">
    <div style="margin-top:10px">${list.map(q=>reviewRow(q,true)).join('') || '<div class="small">Yoxdur</div>'}</div>
    ${pager}</div>`;
}
function viewTesdiqlenib(){
  const search = document.getElementById('tesdSearch')?.value || '';
  const wf = ()=> db.collection('qaimeler').where('status','==','tesdiqlenib');
  let list, pager='';
  if(search){ list = searchList('ist_tesd_search', wf, search); }
  else{ if(!pg['ist_tesd']) pgLoad('ist_tesd', wf); list = (pg['ist_tesd']&&pg['ist_tesd'].rows)||[]; pager = pgButtons('ist_tesd'); }
  reviewQaimeler = list;
  return `<div class="card"><h3>Təsdiq edilib</h3>
    <input id="tesdSearch" placeholder="Axtar (kim üçün / qaimə № / anbar)" value="${search}" oninput="render()">
    <div style="margin-top:10px">${list.map(q=>reviewRow(q,false)).join('') || '<div class="small">Yoxdur</div>'}</div>
    ${pager}</div>`;
}
function viewMedaxilEdilib(){
  const search = document.getElementById('medSearch')?.value || '';
  const wf = ()=> db.collection('qaimeler').where('status','==','medaxil').where('qType','==','istehsalat');
  let list, pager='';
  if(search){ list = searchList('ist_med_search', wf, search); }
  else{ if(!pg['ist_med']) pgLoad('ist_med', wf); list = (pg['ist_med']&&pg['ist_med'].rows)||[]; pager = pgButtons('ist_med'); }
  qaimeler = list;
  return `<div class="card"><h3>Mədaxil edilib</h3>
    <input id="medSearch" placeholder="Axtar (kim üçün / qaimə № / anbar)" value="${search}" oninput="render()">
    <div style="margin-top:10px">${list.map(q=>rowHtml(q)).join('') || '<div class="small">Yoxdur</div>'}</div>
    ${pager}</div>`;
}
function reviewRow(q, isSorgu){
  const orig = q.photos||[];
  const med = q.medaxilPhotos||[];
  return `<div class="row ${isTecili(q)?'tecili':''}">
    <div><b>Qaimə_${q.no}</b> <span class="small">${fmtDate(q.createdAt)}</span></div>
    <div class="small">Sifarişçi: ${q.sifarisVeren||''} | Anbar: ${q.anbar||''} | Kim üçün: ${q.kimUcun||''}</div>
    <div class="small">Mədaxil №: ${q.medaxilNo||''}</div>
    <div class="line-extras" style="margin-top:6px">
      ${orig[0]?`<span><span class="small">Sifariş şəkli:</span><br><img class="thumb" src="${orig[0]}" onclick="openViewer(${JSON.stringify(orig).replace(/"/g,'&quot;')},0)"></span>`:''}
      ${med[0]?`<span><span class="small">Mədaxil şəkli:</span><br><img class="thumb" src="${med[0]}" onclick="openViewer(${JSON.stringify(med).replace(/"/g,'&quot;')},0)"></span>`:'<span class="small">mədaxil şəkli yoxdur</span>'}
    </div>
    ${isSorgu?`<button style="margin-top:6px" onclick="confirmSorgu('${q.id}')">Təsdiq edildi</button>`:`<button class="sec" style="margin-top:6px" onclick="revertTesdiq('${q.id}')">Geri çək</button>`}
  </div>`;
}
async function confirmSorgu(id){ await db.collection('qaimeler').doc(id).update({status:'tesdiqlenib', tesdiqEden: currentUser.name}); pg={}; render(); }
async function revertTesdiq(id){
  const q = reviewQaimeler.find(x=>x.id===id) || qaimeler.find(x=>x.id===id);
  if(q && q.status==='medaxil'){ alert('Mədaxil edilmiş qaimə geri çəkilə bilməz.'); return; }
  await db.collection('qaimeler').doc(id).update({status:'sorgu'});
  pg={};
  render();
}
function viewAddForm(){
  const anbarList = [...new Set(myQaimeler.map(q=>q.anbar).filter(Boolean))];
  return `<div class="card">
    <h3>Qaimə Əlavə Et</h3>
    <label>Sifariş Verən</label>
    <input value="${currentUser.name}" disabled>
    <label>Hansı anbara alındı *</label>
    <input id="f_anbar" list="dl_anbar">
    <datalist id="dl_anbar">${anbarList.map(a=>`<option value="${a}">`).join('')}</datalist>
    <label>Kim üçün alındı *</label>
    <div style="position:relative">
      <input id="f_kim" autocomplete="off" oninput="kimFilter()" onfocus="if(!this.readOnly) kimFilter()" onclick="if(this.readOnly){this.readOnly=false;this.value='';document.getElementById('f_kim_id').value='';kimFilter();}" onblur="setTimeout(()=>{const b=document.getElementById('kimBox'); if(b) b.style.display='none';},150)">
      <input type="hidden" id="f_kim_id">
      <div id="kimBox" style="display:none;position:absolute;z-index:50;background:#fff;border:1px solid #ccc;max-height:180px;overflow:auto;width:100%;box-shadow:0 4px 10px rgba(0,0,0,.15)"></div>
    </div>
    <label>Ödəniş tipi *</label>
    <select id="f_odenis"><option value="">Seçin</option><option>Köçürmə</option><option>Nağd</option></select>
    <label>Qeyd</label>
    <textarea id="f_qeyd" rows="2"></textarea>
    <label><input type="checkbox" id="f_tecili" style="width:auto"> Təcilidir</label>
    <label>Şəkillər</label>
    <div style="display:flex;gap:6px">
      <input type="file" id="f_cam" accept="image/*" capture="environment" multiple style="display:none" onchange="onPick(event)">
      <input type="file" id="f_gal" accept="image/*" multiple style="display:none" onchange="onPick(event)">
      <button type="button" onclick="document.getElementById('f_cam').click()">📷 Şəkil çək</button>
      <button type="button" class="sec" onclick="document.getElementById('f_gal').click()">🖼 Fayldan seç</button>
    </div>
    <div class="imgpick" id="picPreview"></div>
    <div id="addErr" class="small" style="color:red"></div>
    <button id="submitBtn" style="margin-top:12px" onclick="submitQaime()">Əlavə Et</button>
  </div>`;
}
function onPick(e){
  [...e.target.files].forEach(f=>{
    const url = URL.createObjectURL(f);
    pickedFiles.push({file:f, url});
  });
  e.target.value='';
  renderPreview();
}
function renderPreview(){
  const urls = pickedFiles.map(p=>p.url);
  document.getElementById('picPreview').innerHTML = pickedFiles.map((p,i)=>

function compressImage(file, maxSize=1200, quality=0.7, wmLines=null){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let w=img.width, h=img.height;
        if(w>h){ if(w>maxSize){h=h*maxSize/w; w=maxSize;} } else { if(h>maxSize){w=w*maxSize/h; h=maxSize;} }
        const c = document.createElement('canvas'); c.width=w; c.height=h;
        const ctx = c.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        if(wmLines) drawWatermark(ctx, w, wmLines);
        c.toBlob(b=>resolve(b), 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
function drawWatermark(ctx, w, lines){
  const fs = Math.max(12, w*0.032);
  ctx.font = `bold ${fs}px Arial`;
  ctx.textBaseline = 'top';
  ctx.lineWidth = fs*0.15;
  ctx.strokeStyle = 'rgba(255,255,255,.35)';
  ctx.fillStyle = '#000';
  ctx.globalAlpha = 0.2;
  lines.forEach((t,i)=>{ const y=6+i*(fs+4); ctx.strokeText(t,6,y); ctx.fillText(t,6,y); });
  ctx.globalAlpha = 1;
}
function printImage(url){
  let f = document.getElementById('printFrame');
  if(!f){ f = document.createElement('iframe'); f.id='printFrame'; f.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0'; document.body.appendChild(f); }
  const doc = f.contentWindow.document;
  doc.open();
  doc.write(`<html><head><style>@page{margin:0}html,body{margin:0;height:100%}body{display:flex;align-items:center;justify-content:center}img{max-width:100vw;max-height:100vh;object-fit:contain}</style></head><body><img src="${url}" onload="setTimeout(()=>{window.focus();window.print();},200)"></body></html>`);
  doc.close();
}
async function uploadToCloudinary(blob){
  const fd = new FormData();

  return data.secure_url;
}

const CL_API_KEY = '947222283424236', CL_API_SECRET = 'oDGIa0KI-R6KhOazJR7g5sWMzX0';
async function sha1(str){ const b = await crypto.subtle.digest('SHA-1', new TextEncoder().encode(str)); return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''); }
function publicIdFromUrl(url){ const m = url.match(/\/upload\/(?:v\d+\/)?(.+)\.[a-zA-Z0-9]+$/); return m?m[1]:null; }
async function deleteFromCloudinary(url){
  const pid = publicIdFromUrl(url); if(!pid) return true;
  const ts = Math.floor(Date.now()/1000);
  const sig = await sha1(`public_id=${pid}&timestamp=${ts}${CL_API_SECRET}`);
  const fd = new FormData();
  fd.append('public_id', pid); fd.append('timestamp', ts); fd.append('api_key', CL_API_KEY); fd.append('signature', sig);
  try{
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/destroy`, {method:'POST', body:fd});
    const data = await res.json();
    return data.result === 'ok' || data.result === 'not found';
  }catch(e){ console.error(e); return false; }
}
async function deleteQaimePhotos(q){
  const all = [...(q.photos||[]), ...(q.medaxilPhotos||[])];
  const results = await Promise.all(all.map(async u=>({u, ok: await deleteFromCloudinary(u)})));
  const failed = results.filter(r=>!r.ok).map(r=>r.u);
  if(failed.length){
    try{ await db.collection('failedDeletes').add({qaimeNo:q.no||null, urls:failed, at: firebase.firestore.FieldValue.serverTimestamp()}); }catch(e){ console.error(e); }
  }
  return failed;
}
async function deleteQaime(id){

}

function openViewer(photos, idx){
  let rotate = 0, scale = 1, panX = 0, panY = 0, pinchDist = null;
  document.getElementById('modalRoot').innerHTML = `<div id="viewerModal">
    <div class="bar">
      <button class="sec" onclick="closeModal()">Bağla</button>
      <button id="vPrev">◀</button>
      <span id="vCount" style="color:#fff;align-self:center"></span>
      <button id="vNext">▶</button>
      <button id="vRotate">⟳ Döndər</button>
      <button id="vPrint">🖨 Çap et</button>
      <a id="vDl"><button>Yüklə</button></a>
    </div>
    <div id="vWrap" style="flex:1;overflow:hidden;display:flex;touch-action:none;position:relative">
      <img id="vImg" style="max-width:100%;max-height:80vh">
    </div>
  </div>`;
  document.getElementById('vPrint').onclick = ()=> printImage(photos[idx]);
  const img = document.getElementById('vImg');
  const wrap = document.getElementById('vWrap');
  function applyTransform(){
    img.style.transform = `translate(-50%,-50%) translate(${panX}px, ${panY}px) rotate(${rotate}deg) scale(${scale})`;
  }
  function update(){
    img.src = photos[idx];
    applyTransform();
    document.getElementById('vCount').innerText = (idx+1)+'/'+photos.length;
    document.getElementById('vDl').href = photos[idx].replace('/upload/','/upload/fl_attachment/');
  }
  document.getElementById('vPrev').onclick = ()=>{ idx=(idx-1+photos.length)%photos.length; rotate=0; scale=1; panX=0; panY=0; update(); };
  document.getElementById('vNext').onclick = ()=>{ idx=(idx+1)%photos.length; rotate=0; scale=1; panX=0; panY=0; update(); };
  document.getElementById('vRotate').onclick = ()=>{ rotate=(rotate+90)%360; applyTransform(); };
  wrap.addEventListener('wheel', e=>{
    e.preventDefault();
    const rect = wrap.getBoundingClientRect();
    const cx = e.clientX - rect.left - rect.width/2;
    const cy = e.clientY - rect.top - rect.height/2;
    const newScale = Math.max(0.5, Math.min(5, scale + (e.deltaY<0?0.15:-0.15)));
    panX = cx - (cx - panX) * (newScale/scale);
    panY = cy - (cy - panY) * (newScale/scale);
    scale = newScale;
    applyTransform();
  }, {passive:false});
  wrap.addEventListener('touchmove', e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const t0 = e.touches[0], t1 = e.touches[1];
      const dx = t0.clientX-t1.clientX, dy = t0.clientY-t1.clientY;
      const dist = Math.hypot(dx,dy);
      const rect = wrap.getBoundingClientRect();
      const midX = (t0.clientX+t1.clientX)/2 - rect.left - rect.width/2;
      const midY = (t0.clientY+t1.clientY)/2 - rect.top - rect.height/2;
      if(pinchDist!=null){
        const newScale = Math.max(0.5, Math.min(5, scale*(dist/pinchDist)));
        panX = midX - (midX - panX) * (newScale/scale);
        panY = midY - (midY - panY) * (newScale/scale);
        scale = newScale;
        applyTransform();
      }
      pinchDist = dist;
    }
  }, {passive:false});
  wrap.addEventListener('touchend', ()=>{ pinchDist=null; });
  update();
}

async function saveResolve(id){

  dismissed.add(id);

  closeModal();

}

let statsData = null;
function viewStats(){
  if(!statsData){
    statsData = {loading:true};
    db.collection('qaimeler').where('qType','==','istehsalat').get().then(snap=>{
      statsData = {loading:false, list: snap.docs.map(d=>({id:d.id,...d.data()}))};
      if(curNav==='stats') render();
    });
  }
  if(statsData.loading) return '<div class="card"><div class="small">Yüklənir...</div></div>';
  const all = statsData.list;
  const total = all.length;
  const byStatus = {yeni:0, islemede:0, medaxil:0};
  all.forEach(q=>byStatus[q.status]=(byStatus[q.status]||0)+1);
  const problemli = all.filter(hasOpenProblem).length;
  const tecili = all.filter(isTecili).length;

  const days = [...Array(7)].map((_,i)=>{ const d=new Date(); d.setDate(d.getDate()-i); return d; }).reverse();
  const dayCounts = days.map(d=> all.filter(q=>{ if(!q.createdAt) return false; const qd=q.createdAt.toDate?q.createdAt.toDate():new Date(q.createdAt); return qd.toDateString()===d.toDateString(); }).length);
  const maxC = Math.max(1,...dayCounts);
  const chart = `<div class="bar-chart">${days.map((d,i)=>`<div class="small">${d.toLocaleDateString('az-AZ',{weekday:'short',day:'numeric'})}</div><div class="bg"><div class="fg" style="width:${(dayCounts[i]/maxC*100)||2}%">${dayCounts[i]}</div></div>`).join('')}</div>`;

  const mine = all.filter(q=>q.sifarisVeren===currentUser.name);
  const today = mine.filter(q=>isToday(q.createdAt)).length;

  return `<div class="card"><h3>Ümumi Vəziyyət (İstehsalat)</h3>
    <div>Ümumi qaimə: ${total}</div>
    <div>Yeni: ${byStatus.yeni||0} | İşləmədə: ${byStatus.islemede||0} | Mədaxil olan: ${byStatus.medaxil||0}</div>
    <div>Təcili: ${tecili} | Problemli: ${problemli}</div>
    <h4>Son 7 gün</h4>${chart}
  </div>
  <div class="card"><h3>Mənim Statistikam</h3><div>Ümumi əlavə etdiyim: ${mine.length}</div><div>Bugün: ${today}</div></div>`;
}
