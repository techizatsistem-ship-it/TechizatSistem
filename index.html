<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Qaimə Sistemi</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#f2f2f2;color:#222}
input,select,textarea,button{font-size:15px;padding:8px;border:1px solid #ccc;border-radius:5px;width:100%;margin-top:4px}
button{background:#2563eb;color:#fff;border:none;cursor:pointer;width:auto;padding:8px 14px}
button.sec{background:#666}
button.danger{background:#c0392b}
label{font-size:13px;color:#555;margin-top:8px;display:block}
.hidden{display:none!important}
#loginBox{max-width:320px;margin:80px auto;background:#fff;padding:20px;border-radius:8px}
header{background:#1e293b;color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
header .navs{display:flex;flex-direction:column;gap:6px}
header .tabs{display:flex;gap:6px;flex-wrap:wrap}
header .tabs button{background:#334155;padding:6px 10px}
header .tabs button.active{background:#2563eb}
#modeSwitch button{background:#0f766e}
#modeSwitch button.active{background:#14b8a6}
#userInfo{font-size:13px}
main{padding:12px;max-width:900px;margin:0 auto}
.card{background:#fff;padding:14px;border-radius:8px;margin-bottom:12px}
.row{border:1px solid #ddd;border-radius:6px;margin-bottom:6px;padding:8px;background:#fff}
.row.tecili{border:2px solid #c0392b}
.row .line{font-size:14px;cursor:pointer}
.row .line b{color:#2563eb}
.line-grid{display:grid;grid-template-columns:24px 90px 1fr 1fr 1fr 80px;gap:8px;align-items:center}
.line-extras{display:flex;gap:8px;align-items:center;margin-top:4px;flex-wrap:wrap}
.col-check{width:24px}
.row .details{margin-top:8px;font-size:13px;color:#444;border-top:1px solid #eee;padding-top:8px}
.thumb{width:50px;height:50px;object-fit:cover;border-radius:4px;cursor:pointer}
.tabbar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.tabbar button{background:#e2e8f0;color:#222;padding:6px 10px}
.tabbar button.active{background:#2563eb;color:#fff}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:50;padding:10px}
.modal .box{background:#fff;padding:16px;border-radius:8px;max-width:420px;width:100%;max-height:90vh;overflow:auto}
#viewerModal{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;flex-direction:column;z-index:60}
#viewerModal img{max-width:100%;max-height:80vh;margin:auto;transition:transform .2s}
#viewerModal .bar{display:flex;gap:8px;padding:10px;justify-content:center;flex-wrap:wrap}
.badge{background:#c0392b;color:#fff;border-radius:12px;padding:2px 8px;font-size:12px}
.small{font-size:12px;color:#666}
.imgpick{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.imgpick img{width:60px;height:60px;object-fit:cover;border-radius:4px}
table{width:100%;border-collapse:collapse;font-size:13px}
td,th{border:1px solid #ddd;padding:6px;text-align:left}
.bar-chart div.bg{background:#eee;border-radius:3px;margin:4px 0}
.bar-chart div.fg{background:#2563eb;height:14px;border-radius:3px;color:#fff;font-size:11px;padding-left:4px}
.pastebox{border:1px dashed #999;border-radius:6px;padding:10px;text-align:center;color:#777;margin-top:6px;outline:none}
</style>
</head>
<body>

<div id="loginBox">
  <h3>Giriş</h3>
  <label>İstifadəçi adı</label>
  <input id="loginUser">
  <label>Şifrə</label>
  <input id="loginPass" type="password">
  <button style="margin-top:12px;width:100%" onclick="doLogin()">Daxil ol</button>
  <div id="loginErr" class="small" style="color:red"></div>
</div>

<div id="app" class="hidden">
<header>
  <div class="navs">
    <div class="tabs" id="modeSwitch"></div>
    <div class="tabs" id="navTabs"></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="bellWrap"></div>
    <div id="userInfo"></div>
  </div>
</header>
<main id="main"></main>
</div>

<div id="modalRoot"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD-w-HjawIvU8u7QvpjEhlgq2K2QXzs4bM",
  authDomain: "techizat-8f0bc.firebaseapp.com",
  projectId: "techizat-8f0bc",
  storageBucket: "techizat-8f0bc.firebasestorage.app",
  messagingSenderId: "74888831335",
  appId: "1:74888831335:web:5257610bfa03ab67b14fc2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const CLOUD_NAME='hpdyrlnl', UPLOAD_PRESET='qaimeler';
const THREE_MONTHS_MS = 90*86400000;

let currentUser = JSON.parse(localStorage.getItem('cu')||'null');
let qaimeler = [];
let curTab = 'aktiv';
let curNav = null;
let selected = new Set();
let dismissed = new Set();
let pickedFiles = []; // sifariş şəkilləri {file, url}
let medPicked = [];   // mədaxil şəkilləri {file, url}

// ---------- ROL YARDIMÇILARI ----------
function roleLabel(r){ return {sifarisci:'Sifarişçi',anbar:'Anbar',korporativ:'Korporativ',admin:'Admin'}[r]||r; }

// ---------- INIT / SEED ----------
async function seedUsers(){
  const defs = [
    {id:'sifaris', password:'1234', roles:['sifarisci'], name:'Sifarişçi'},
    {id:'sistem', password:'1234', roles:['anbar'], name:'Anbar İşçisi'},
    {id:'korporativ', password:'1234', roles:['korporativ'], name:'Korporativ'},
    {id:'admin', password:'adminadmin', roles:['admin'], name:'Admin'}
  ];
  for(const u of defs){
    const ref = db.collection('users').doc(u.id);
    const snap = await ref.get();
    if(!snap.exists) await ref.set({password:u.password, roles:u.roles, name:u.name});
  }
}
seedUsers();

async function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  const snap = await db.collection('users').doc(u).get();
  if(!snap.exists || snap.data().password !== p){
    document.getElementById('loginErr').innerText = 'İstifadəçi adı və ya şifrə yanlışdır';
    return;
  }
  const d = snap.data();
  const roles = d.roles || (d.role ? [d.role] : []);
  if(roles.includes('admin')){ location.href = 'admin.html'; return; }
  if(roles.includes('korporativ')){ location.href = 'korporativ.html'; return; }
  currentUser = {username:u, roles, mode:roles[0], name:d.name};
  localStorage.setItem('cu', JSON.stringify(currentUser));
  boot();
}
function logout(){ localStorage.removeItem('cu'); location.reload(); }

function boot(){
  if(!currentUser) return;
  if(!currentUser.mode) currentUser.mode = currentUser.roles[0];
  document.getElementById('loginBox').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('userInfo').innerText = currentUser.name + ' çıxış';
  document.getElementById('userInfo').style.cursor='pointer';
  document.getElementById('userInfo').onclick = logout;
  renderModeSwitch();
  setupNav();
  db.collection('qaimeler').orderBy('createdAt','desc').onSnapshot(snap=>{
    qaimeler = snap.docs.map(d=>({id:d.id, ...d.data()}));
    render();
    renderBell();
    cleanupOld();
    if(currentUser.roles.includes('sifarisci')) checkNotifications();
  });
}
if(currentUser) boot();

function renderModeSwitch(){
  const el = document.getElementById('modeSwitch');
  if(!currentUser.roles || currentUser.roles.length<2){ el.innerHTML=''; return; }
  el.innerHTML = currentUser.roles.map(r=>`<button class="${currentUser.mode===r?'active':''}" onclick="switchMode('${r}')">${roleLabel(r)}</button>`).join('');
}
function switchMode(r){
  currentUser.mode = r;
  localStorage.setItem('cu', JSON.stringify(currentUser));
  renderModeSwitch();
  setupNav();
}

function setupNav(){
  let tabs = [];
  if(currentUser.mode==='sifarisci') tabs=[['add','Qaimə Əlavə Et'],['mine','Mənim Qaimlərim'],['stats','Analitika']];
  if(currentUser.mode==='anbar') tabs=[['list','Qaimlər'],['stats','Analitika']];
  curNav = tabs[0][0];
  const el = document.getElementById('navTabs');
  el.innerHTML = tabs.map(t=>`<button data-n="${t[0]}" onclick="setNav('${t[0]}')">${t[1]}</button>`).join('');
  render();
}
function setNav(n){ curNav=n; render(); }

// ---------- HELPERS ----------
function fmtDate(ts){ if(!ts) return ''; const d = ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString('az-AZ')+' '+d.toLocaleTimeString('az-AZ',{hour:'2-digit',minute:'2-digit'}); }
function isToday(ts){ if(!ts) return false; const d=ts.toDate?ts.toDate():new Date(ts); const t=new Date(); return d.toDateString()===t.toDateString(); }
function daysAgo(ts){ if(!ts) return 0; const d=ts.toDate?ts.toDate():new Date(ts); return (Date.now()-d.getTime())/86400000; }
function isTecili(q){ return q.tecili===true || (q.status==='yeni' && daysAgo(q.createdAt)>3); }
function hasOpenProblem(q){ return q.problem && !q.problem.solved; }
function statusLabel(s){ return s==='yeni'?'Yeni':(s==='islemede'?'İşlənir':'Mədaxil edildi'); }
function dlUrl(u){ return u.replace('/upload/','/upload/fl_attachment/'); }

// 3 aydan köhnə qaimələri avtomatik sil (storage dolmasın deyə)
let cleanupDone = new Set();
function cleanupOld(){
  const cutoff = Date.now()-THREE_MONTHS_MS;
  qaimeler.forEach(q=>{
    if(cleanupDone.has(q.id) || !q.createdAt) return;
    const t = q.createdAt.toMillis ? q.createdAt.toMillis() : new Date(q.createdAt).getTime();
    if(t < cutoff){
      cleanupDone.add(q.id);
      db.collection('qaimeler').doc(q.id).delete().catch(()=>{});
    }
  });
}

// ---------- RENDER ROOT ----------
function render(){
  const af = document.activeElement;
  const afId = af && af.id, afStart = af && af.selectionStart, afEnd = af && af.selectionEnd;
  document.querySelectorAll('#navTabs button').forEach(b=>b.classList.toggle('active', b.dataset.n===curNav));
  const m = document.getElementById('main');
  if(currentUser.mode==='sifarisci'){
    if(curNav==='add') m.innerHTML = viewAddForm();
    else if(curNav==='mine') m.innerHTML = viewMine();
    else m.innerHTML = viewStats();
  } else {
    if(curNav==='list') m.innerHTML = viewAnbarList();
    else m.innerHTML = viewStats();
  }
  if(afId){ const el=document.getElementById(afId); if(el && el.focus){ el.focus(); if(afStart!=null && el.setSelectionRange) try{el.setSelectionRange(afStart,afEnd);}catch(e){} } }
}

// ---------- ADD QAIME (Sifarişçi) ----------
function viewAddForm(){
  const kimUcunList = [...new Set(qaimeler.map(q=>q.kimUcun).filter(Boolean))];
  const anbarList = [...new Set(qaimeler.map(q=>q.anbar).filter(Boolean))];
  return `<div class="card">
    <h3>Qaimə Əlavə Et</h3>
    <label>Sifariş Verən</label>
    <input value="${currentUser.name}" disabled>
    <label>Hansı anbara alındı *</label>
    <input id="f_anbar" list="dl_anbar">
    <datalist id="dl_anbar">${anbarList.map(a=>`<option value="${a}">`).join('')}</datalist>
    <label>Kim üçün alındı *</label>
    <input id="f_kim" list="dl_kim">
    <datalist id="dl_kim">${kimUcunList.map(a=>`<option value="${a}">`).join('')}</datalist>
    <label>Ödəniş tipi *</label>
    <select id="f_odenis"><option value="">Seçin</option><option>Köçürmə</option><option>Nağd</option></select>
    <label>Qeyd</label>
    <textarea id="f_qeyd" rows="2"></textarea>
    <label><input type="checkbox" id="f_tecili" style="width:auto"> Təcilidir</label>
    <label>Şəkillər</label>
    <div style="display:flex;gap:6px">
      <input type="file" id="f_cam" accept="image/*" capture="environment" multiple style="display:none" onchange="onPick(event)">
      <input type="file" id="f_gal" accept="image/*" multiple style="display:none" onchange="onPick(event)">
      <button type="button" onclick="document.getElementById('f_cam').click()">📷 Şəkil çək</button>
      <button type="button" class="sec" onclick="document.getElementById('f_gal').click()">🖼 Fayldan seç</button>
    </div>
    <div class="imgpick" id="picPreview"></div>
    <div id="addErr" class="small" style="color:red"></div>
    <button style="margin-top:12px" onclick="submitQaime()">Əlavə Et</button>
  </div>`;
}
function onPick(e){
  [...e.target.files].forEach(f=>{
    const url = URL.createObjectURL(f);
    pickedFiles.push({file:f, url});
  });
  e.target.value='';
  renderPreview();
}
function renderPreview(){
  document.getElementById('picPreview').innerHTML = pickedFiles.map((p,i)=>
    `<div style="position:relative"><img src="${p.url}"><button onclick="pickedFiles.splice(${i},1);renderPreview()" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;padding:0;border-radius:50%;background:#c0392b">×</button></div>`
  ).join('');
}
function compressImage(file, maxSize=1200, quality=0.7){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let w=img.width, h=img.height;
        if(w>h){ if(w>maxSize){h=h*maxSize/w; w=maxSize;} } else { if(h>maxSize){w=w*maxSize/h; h=maxSize;} }
        const c = document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        c.toBlob(b=>resolve(b), 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
async function uploadToCloudinary(blob){
  const fd = new FormData();
  fd.append('file', blob);
  fd.append('upload_preset', UPLOAD_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {method:'POST', body:fd});
  const data = await res.json();
  return data.secure_url;
}
async function submitQaime(){
  const anbar = document.getElementById('f_anbar').value.trim();
  const kim = document.getElementById('f_kim').value.trim();
  const odenis = document.getElementById('f_odenis').value;
  const qeyd = document.getElementById('f_qeyd').value.trim();
  const tecili = document.getElementById('f_tecili').checked;
  const err = document.getElementById('addErr');
  if(!anbar || !kim || !odenis){ err.innerText='Anbar, kim üçün və ödəniş tipi mütləqdir'; return; }
  const files = pickedFiles; pickedFiles = [];
  const no = await db.runTransaction(async t=>{
    const ref = db.collection('meta').doc('counter');
    const snap = await t.get(ref);
    const val = (snap.exists? snap.data().value:0)+1;
    t.set(ref,{value:val});
    return val;
  });
  const docRef = await db.collection('qaimeler').add({
    no, sifarisVeren: currentUser.name, anbar, kimUcun: kim, odenisTipi: odenis, qeyd,
    tecili, photos: [], photosUploading: files.length>0, status:'yeni', isleyen:null, problem:null,
    medaxilPhotos: [], medaxilPhotosUploading:false,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(), medaxilNo:null
  });
  curNav='mine'; render();
  if(files.length){
    const photos = [];
    for(const p of files){ const blob = await compressImage(p.file); photos.push(await uploadToCloudinary(blob)); }
    await docRef.update({photos, photosUploading:false});
  }
}

// ---------- MINE (Sifarişçi) ----------
function viewMine(){
  const mine = qaimeler.filter(q=>q.sifarisVeren===currentUser.name);
  return `<div class="card"><h3>Mənim Qaimlərim (${mine.length})</h3>${listHead()}${mine.map(q=>rowHtml(q)).join('') || '<div class="small">Yoxdur</div>'}</div>`;
}

// ---------- ANBAR LIST ----------
function viewAnbarList(){
  const problemCount = qaimeler.filter(q=>hasOpenProblem(q)).length;
  const tabs = [['aktiv','Mədaxil olunmayanlar'],['islemede','İşləyirəm'],['medaxil','Mədaxil Olan'],['tecili','Təcili'],['problemli','Problemli']];
  let list = filterByTab(curTab);
  const search = document.getElementById('anbarSearch')?.value || '';
  if(search) list = list.filter(q=> String(q.no).includes(search) || (q.anbar||'').toLowerCase().includes(search.toLowerCase()));
  list = list.slice().sort((a,b)=> (isTecili(b)?1:0)-(isTecili(a)?1:0));
  return `<div class="card">
    <input id="anbarSearch" placeholder="Axtar (qaimə № / anbar)" value="${search}" oninput="render()">
    <div class="tabbar" style="margin-top:10px">${tabs.map(t=>`<button class="${curTab===t[0]?'active':''}" onclick="curTab='${t[0]}';render()">${t[1]}${t[0]==='problemli'&&problemCount?` <span class="badge">${problemCount}</span>`:''}</button>`).join('')}</div>
    ${curTab==='aktiv'?`<button onclick="bulkTake()">İşlə (seçilənlər: ${selected.size})</button>`:''}
    <div style="margin-top:10px">${listHead()}${list.map(q=>rowHtml(q,true)).join('') || '<div class="small">Yoxdur</div>'}</div>
  </div>`;
}
function filterByTab(tab){
  if(tab==='medaxil') return qaimeler.filter(q=>q.status==='medaxil');
  if(tab==='problemli') return qaimeler.filter(q=>hasOpenProblem(q));
  if(tab==='tecili') return qaimeler.filter(q=>isTecili(q) && q.status!=='medaxil' && !hasOpenProblem(q));
  if(tab==='islemede') return qaimeler.filter(q=>q.status==='islemede' && q.isleyen===currentUser.name && !hasOpenProblem(q));
  return qaimeler.filter(q=>q.status==='yeni' && !hasOpenProblem(q)); // aktiv = Mədaxil olunmayanlar
}

// ---------- ROW ----------
function listHead(){
  return `<div class="line-grid small" style="font-weight:bold;padding:4px 8px">
    <span class="col-check"></span>
    <span>Qaimə</span>
    <span>Sifariş verən</span>
    <span>Anbar</span>
    <span>Kim üçün</span>
    <span>Ödəniş</span>
  </div>`;
}
function rowHtml(q, anbarMode){
  const tecili = isTecili(q);
  const problem = hasOpenProblem(q);
  const checkbox = (anbarMode && curTab==='aktiv') ? `<input type="checkbox" style="width:auto" ${selected.has(q.id)?'checked':''} onclick="event.stopPropagation();toggleSel('${q.id}')">` : '';
  const photos = q.photos||[];
  const thumb = photos[0] ? `<img class="thumb" src="${photos[0]}" onclick="event.stopPropagation();openViewer(${JSON.stringify(photos).replace(/"/g,'&quot;')},0)">` : '';
  return `<div class="row ${tecili?'tecili':''}">
    <div class="line" onclick="toggleDetails('${q.id}')">
      <div class="line-grid">
        <span class="col-check">${checkbox}</span>
        <span><b>Qaimə_${q.no}</b></span>
        <span>${q.sifarisVeren}</span>
        <span>${q.anbar}</span>
        <span>${q.kimUcun}</span>
        <span>${q.odenisTipi}</span>
      </div>
      <div class="line-extras">
        ${problem?'<span class="badge">Problem</span>':''}
        ${thumb}
        ${q.status==='yeni'?'<span class="small">işlənməyi gözləyir</span>':''}
        ${q.photosUploading?'<span class="small">şəkil yüklənir...</span>':''}
        ${q.medaxilPhotosUploading?'<span class="small">mədaxil şəkli yüklənir...</span>':''}
      </div>
    </div>
    <div class="details hidden" id="det_${q.id}">
      <div>Tarix: ${fmtDate(q.createdAt)}</div>
      <div>Status: ${statusLabel(q.status)}${q.isleyen?(' — İşləyir: '+q.isleyen):''}</div>
      ${q.qeyd?`<div>Qeyd: ${q.qeyd}</div>`:''}
      ${q.medaxilNo?`<div>Mədaxil №: ${q.medaxilNo}</div>`:''}
      ${q.medaxilPhotos && q.medaxilPhotos[0] ? `<div style="margin-top:6px">Mədaxil şəkli: <img class="thumb" src="${q.medaxilPhotos[0]}" onclick="openViewer(${JSON.stringify(q.medaxilPhotos).replace(/"/g,'&quot;')},0)"></div>`:''}
      ${problem?`<div style="color:#c0392b">Problem: ${q.problem.text}</div>`:''}
      ${q.problem && q.problem.solved?`<div style="color:green">Həll: ${q.problem.solution}</div>`:''}
      ${anbarActions(q)}
      ${sifarisciActions(q)}
    </div>
  </div>`;
}
function anbarActions(q){
  if(currentUser.mode!=='anbar') return '';
  let html = '';
  if(q.status==='islemede' && q.isleyen===currentUser.name && !hasOpenProblem(q)){
    html += `<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
      <button class="danger" onclick="openProblemModal('${q.id}')">Problem bildir</button>
      <button onclick="openMedaxilModal('${q.id}')">Mədaxil edildi</button>
    </div>`;
  }
  return html;
}
function sifarisciActions(q){
  if(currentUser.mode!=='sifarisci') return '';
  let html = '';
  if(hasOpenProblem(q) && q.sifarisVeren===currentUser.name){
    html += `<button class="danger" style="margin-top:6px" onclick="openResolveModal('${q.id}')">Problemi Həll Et</button>`;
  }
  if(q.status==='yeni' && q.sifarisVeren===currentUser.name){
    html += `<div style="display:flex;gap:6px;margin-top:6px">
      <button class="sec" onclick="openEditModal('${q.id}')">Düzəliş et</button>
      <button class="danger" onclick="deleteQaime('${q.id}')">Sil</button>
    </div>`;
  }
  return html;
}
function openEditModal(id){
  const q = qaimeler.find(x=>x.id===id);
  document.getElementById('modalRoot').innerHTML = `<div class="modal"><div class="box">
    <h3>Qaimə_${q.no} — Düzəliş</h3>
    <label>Hansı anbara alındı</label><input id="e_anbar" value="${q.anbar}">
    <label>Kim üçün alındı</label><input id="e_kim" value="${q.kimUcun}">
    <label>Ödəniş tipi</label>
    <select id="e_odenis"><option ${q.odenisTipi==='Köçürmə'?'selected':''}>Köçürmə</option><option ${q.odenisTipi==='Nağd'?'selected':''}>Nağd</option></select>
    <label>Qeyd</label><textarea id="e_qeyd" rows="2">${q.qeyd||''}</textarea>
    <label><input type="checkbox" id="e_tecili" style="width:auto" ${q.tecili?'checked':''}> Təcilidir</label>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button class="sec" onclick="closeModal()">Ləğv et</button>
      <button onclick="saveEdit('${id}')">Yadda saxla</button>
    </div>
  </div></div>`;
}
async function saveEdit(id){
  await db.collection('qaimeler').doc(id).update({
    anbar: document.getElementById('e_anbar').value.trim(),
    kimUcun: document.getElementById('e_kim').value.trim(),
    odenisTipi: document.getElementById('e_odenis').value,
    qeyd: document.getElementById('e_qeyd').value.trim(),
    tecili: document.getElementById('e_tecili').checked
  });
  closeModal();
}
async function deleteQaime(id){
  if(!confirm('Qaimə silinsin?')) return;
  await db.collection('qaimeler').doc(id).delete();
}
function toggleDetails(id){ document.getElementById('det_'+id).classList.toggle('hidden'); }
function toggleSel(id){ selected.has(id)?selected.delete(id):selected.add(id); render(); }
async function bulkTake(){
  if(selected.size===0) return;
  const batch = db.batch();
  selected.forEach(id=>{
    batch.update(db.collection('qaimeler').doc(id), {status:'islemede', isleyen:currentUser.name, tookAt: firebase.firestore.FieldValue.serverTimestamp()});
  });
  await batch.commit();
  selected.clear();
  render();
}

// ---------- PHOTO VIEWER (scroll/pinch ilə yaxınlaşdırma) ----------
function openViewer(photos, idx){
  let rotate = 0, scale = 1, pinchDist = null;
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div id="viewerModal">
    <div class="bar">
      <button class="sec" onclick="closeModal()">Bağla</button>
      <button id="vPrev">◀</button>
      <span id="vCount" style="color:#fff;align-self:center"></span>
      <button id="vNext">▶</button>
      <button id="vRotate">⟳ Döndər</button>
      <a id="vDl"><button>Yüklə</button></a>
    </div>
    <div id="vWrap" style="flex:1;overflow:hidden;display:flex;touch-action:none">
      <img id="vImg" style="max-width:100%;max-height:80vh;margin:auto">
    </div>
  </div>`;
  const img = document.getElementById('vImg');
  function update(){
    img.src = photos[idx];
    img.style.transform = `rotate(${rotate}deg) scale(${scale})`;
    document.getElementById('vCount').innerText = (idx+1)+'/'+photos.length;
    document.getElementById('vDl').href = dlUrl(photos[idx]);
  }
  document.getElementById('vPrev').onclick = ()=>{ idx=(idx-1+photos.length)%photos.length; rotate=0; scale=1; update(); };
  document.getElementById('vNext').onclick = ()=>{ idx=(idx+1)%photos.length; rotate=0; scale=1; update(); };
  document.getElementById('vRotate').onclick = ()=>{ rotate=(rotate+90)%360; update(); };
  const wrap = document.getElementById('vWrap');
  wrap.addEventListener('wheel', e=>{
    e.preventDefault();
    scale = Math.max(0.5, Math.min(5, scale + (e.deltaY<0?0.15:-0.15)));
    img.style.transform = `rotate(${rotate}deg) scale(${scale})`;
  }, {passive:false});
  wrap.addEventListener('touchmove', e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const dx = e.touches[0].clientX-e.touches[1].clientX, dy = e.touches[0].clientY-e.touches[1].clientY;
      const dist = Math.hypot(dx,dy);
      if(pinchDist!=null){
        scale = Math.max(0.5, Math.min(5, scale*(dist/pinchDist)));
        img.style.transform = `rotate(${rotate}deg) scale(${scale})`;
      }
      pinchDist = dist;
    }
  }, {passive:false});
  wrap.addEventListener('touchend', ()=>{ pinchDist=null; });
  update();
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; medPicked=[]; }

// ---------- PROBLEM MODAL ----------
function openProblemModal(id){
  document.getElementById('modalRoot').innerHTML = `<div class="modal"><div class="box">
    <h3>Problem bildir</h3>
    <textarea id="probText" rows="3" placeholder="Problemi yazın"></textarea>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button onclick="closeModal()" class="sec">Ləğv et</button>
      <button onclick="saveProblem('${id}')">Göndər</button>
    </div>
  </div></div>`;
}
async function saveProblem(id){
  const text = document.getElementById('probText').value.trim();
  if(!text) return;
  await db.collection('qaimeler').doc(id).update({problem:{text, solved:false}});
  closeModal();
}

// ---------- MEDAXIL MODAL (kod + şəkil, fayl seçmə və ya Ctrl+V) ----------
function openMedaxilModal(id){
  medPicked = [];
  document.getElementById('modalRoot').innerHTML = `<div class="modal"><div class="box" id="medBox">
    <h3>Mədaxil edildi</h3>
    <label>Qaimə nömrəsi *</label>
    <input id="medNo">
    <label>Mədaxil şəkli</label>
    <div style="display:flex;gap:6px">
      <input type="file" id="med_file" accept="image/*" multiple style="display:none" onchange="onMedPick(event)">
      <button type="button" class="sec" onclick="document.getElementById('med_file').click()">🖼 Şəkil seç</button>
    </div>
    <div class="pastebox" id="medPasteZone" tabindex="0">Şəkli kopyalayıb buraya klikləyib Ctrl+V edin</div>
    <div class="imgpick" id="medPreview"></div>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button onclick="closeModal()" class="sec">Ləğv et</button>
      <button onclick="saveMedaxil('${id}')">OK</button>
    </div>
  </div></div>`;
  document.getElementById('medPasteZone').focus();
}
function onMedPick(e){
  [...e.target.files].forEach(f=> medPicked.push({file:f, url:URL.createObjectURL(f)}));
  e.target.value='';
  renderMedPreview();
}
function renderMedPreview(){
  const el = document.getElementById('medPreview');
  if(!el) return;
  el.innerHTML = medPicked.map((p,i)=>
    `<div style="position:relative"><img src="${p.url}"><button onclick="medPicked.splice(${i},1);renderMedPreview()" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;padding:0;border-radius:50%;background:#c0392b">×</button></div>`
  ).join('');
}
document.addEventListener('paste', e=>{
  if(!document.getElementById('medPreview')) return;
  const items = e.clipboardData?.items || [];
  let added = false;
  for(const it of items){
    if(it.type.startsWith('image/')){
      const f = it.getAsFile();
      medPicked.push({file:f, url:URL.createObjectURL(f)});
      added = true;
    }
  }
  if(added) renderMedPreview();
});
async function saveMedaxil(id){
  const no = document.getElementById('medNo').value.trim();
  if(!no) return;
  const files = medPicked; medPicked = [];
  await db.collection('qaimeler').doc(id).update({status:'medaxil', medaxilNo:no, medaxilPhotosUploading: files.length>0});
  closeModal();
  if(files.length){
    const arr = [];
    for(const p of files){ const blob = await compressImage(p.file); arr.push(await uploadToCloudinary(blob)); }
    await db.collection('qaimeler').doc(id).update({medaxilPhotos: arr, medaxilPhotosUploading:false});
  }
}

function openResolveModal(id){
  const q = qaimeler.find(x=>x.id===id);
  document.getElementById('modalRoot').innerHTML = `<div class="modal"><div class="box">
    <h3>Qaimə_${q.no} — Problem</h3>
    ${q.photos&&q.photos[0]?`<img src="${q.photos[0]}" style="width:100%;border-radius:6px;cursor:pointer" onclick="openViewer(${JSON.stringify(q.photos).replace(/"/g,'&quot;')},0)">`:''}
    <div style="color:#c0392b;margin-top:8px">${q.problem.text}</div>
    <label>Problemin həlli *</label>
    <textarea id="solText" rows="3"></textarea>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button onclick="closeModal()" class="sec">Bağla</button>
      <button onclick="saveResolve('${id}')">Həll edildi</button>
    </div>
  </div></div>`;
}
async function saveResolve(id){
  const sol = document.getElementById('solText').value.trim();
  if(!sol) return;
  const q = qaimeler.find(x=>x.id===id);
  await db.collection('qaimeler').doc(id).update({problem:{text:q.problem.text, solved:true, solution:sol}});
  dismissed.add(id);
  closeModal();
}

// ---------- KORPORATIV MESAJ BİLDİRİŞLƏRİ (Anbar üçün) ----------
function anbarMessages(){
  if(!currentUser.roles || !currentUser.roles.includes('anbar')) return [];
  const out = [];
  qaimeler.forEach(q=>{
    if(q.isleyen===currentUser.name && q.korpMessages && q.korpMessages.length){
      q.korpMessages.forEach(m=> out.push({...m, qno:q.no, qid:q.id}));
    }
  });
  out.sort((a,b)=> new Date(b.createdAt)-new Date(a.createdAt));
  return out;
}
function renderBell(){
  const el = document.getElementById('bellWrap');
  if(!el) return;
  const msgs = anbarMessages();
  if(!currentUser.roles.includes('anbar') || msgs.length===0){ el.innerHTML=''; return; }
  el.innerHTML = `<button onclick="openBell()">🔔 Bildirişlər <span class="badge">${msgs.length}</span></button>`;
}
function openBell(){
  const msgs = anbarMessages();
  document.getElementById('modalRoot').innerHTML = `<div class="modal"><div class="box">
    <h3>Korporativdən Bildirişlər</h3>
    ${msgs.map(m=>`<div class="row"><b>Qaimə_${m.qno}</b> — ${fmtDate(m.createdAt)}<div>Ad: ${m.ad}</div><div>Mesaj: ${m.text}</div></div>`).join('') || '<div class="small">Yoxdur</div>'}
    <button class="sec" style="margin-top:10px" onclick="closeModal()">Bağla</button>
  </div></div>`;
}

// ---------- NOTIFICATIONS ----------
function checkNotifications(){
  const mine = qaimeler.filter(q=>hasOpenProblem(q) && q.sifarisVeren===currentUser.name && !dismissed.has(q.id));
  if(mine.length>0 && !document.getElementById('modalRoot').innerHTML){
    document.getElementById('modalRoot').innerHTML = `<div class="modal"><div class="box">
      <h3>Problemli qaimələr (${mine.length})</h3>
      ${mine.map(q=>`<div class="row" onclick="openResolveModal('${q.id}')" style="cursor:pointer"><b>Qaimə_${q.no}</b> — ${q.problem.text}</div>`).join('')}
      <button class="sec" style="margin-top:10px" onclick="mine.forEach(m=>dismissed.add(m.id));closeModal()">Bağla</button>
    </div></div>`;
  }
}

// ---------- STATS ----------
function viewStats(){
  const total = qaimeler.length;
  const byStatus = {yeni:0, islemede:0, medaxil:0};
  qaimeler.forEach(q=>byStatus[q.status]=(byStatus[q.status]||0)+1);
  const problemli = qaimeler.filter(hasOpenProblem).length;
  const tecili = qaimeler.filter(isTecili).length;

  const days = [...Array(7)].map((_,i)=>{ const d=new Date(); d.setDate(d.getDate()-i); return d; }).reverse();
  const dayCounts = days.map(d=> qaimeler.filter(q=>{ if(!q.createdAt) return false; const qd=q.createdAt.toDate?q.createdAt.toDate():new Date(q.createdAt); return qd.toDateString()===d.toDateString(); }).length);
  const maxC = Math.max(1,...dayCounts);
  const chart = `<div class="bar-chart">${days.map((d,i)=>`<div class="small">${d.toLocaleDateString('az-AZ',{weekday:'short',day:'numeric'})}</div><div class="bg"><div class="fg" style="width:${(dayCounts[i]/maxC*100)||2}%">${dayCounts[i]}</div></div>`).join('')}</div>`;

  let personal = '';
  if(currentUser.mode==='sifarisci'){
    const mine = qaimeler.filter(q=>q.sifarisVeren===currentUser.name);
    const today = mine.filter(q=>isToday(q.createdAt)).length;
    personal = `<div class="card"><h3>Mənim Statistikam</h3><div>Ümumi əlavə etdiyim: ${mine.length}</div><div>Bugün: ${today}</div></div>`;
  }
  if(currentUser.mode==='anbar'){
    const myWork = qaimeler.filter(q=>q.isleyen===currentUser.name);
    const myMedaxilToday = myWork.filter(q=>q.status==='medaxil' && isToday(q.tookAt)).length;
    const myActive = myWork.filter(q=>q.status==='islemede').length;
    personal = `<div class="card"><h3>Mənim Statistikam</h3><div>Hazırda işlədiyim: ${myActive}</div><div>Bugün mədaxil etdiyim: ${myMedaxilToday}</div></div>`;
  }

  let anbarTable = '';
  if(currentUser.mode==='anbar' || currentUser.mode==='admin'){
    const workers = [...new Set(qaimeler.map(q=>q.isleyen).filter(Boolean))];
    const weekAgo = Date.now()-7*86400000;
    const rows = workers.map(w=>{
      const wq = qaimeler.filter(q=>q.isleyen===w);
      const active = wq.filter(q=>q.status==='islemede').length;
      const medToday = wq.filter(q=>q.status==='medaxil' && isToday(q.tookAt)).length;
      const medWeek = wq.filter(q=>q.status==='medaxil' && q.tookAt && (q.tookAt.toDate?q.tookAt.toDate():new Date(q.tookAt)).getTime()>weekAgo).length;
      return `<tr><td>${w}</td><td>${active}</td><td>${medToday}</td><td>${medWeek}</td></tr>`;
    }).join('');
    anbarTable = `<div class="card"><h3>Anbar İşçiləri</h3><table><tr><th>Ad</th><th>Hazırda işlədiyi</th><th>Bugün mədaxil</th><th>Həftəlik mədaxil</th></tr>${rows}</table></div>`;
  }

  return `<div class="card"><h3>Ümumi Vəziyyət</h3>
    <div>Ümumi qaimə: ${total}</div>
    <div>Yeni: ${byStatus.yeni||0} | İşləmədə: ${byStatus.islemede||0} | Mədaxil olan: ${byStatus.medaxil||0}</div>
    <div>Təcili: ${tecili} | Problemli: ${problemli}</div>
    <h4>Son 7 gün</h4>${chart}
  </div>
  ${personal}
  ${anbarTable}`;
}
</script>
