<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Korporativ — Qaimə Sistemi</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="push-config.js"></script>
<style>

*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#f2f2f2;color:#222}
input,select,textarea,button{font-size:15px;padding:8px;border:1px solid #ccc;border-radius:5px;width:100%;margin-top:4px}
button{background:#2563eb;color:#fff;border:none;cursor:pointer;width:auto;padding:8px 14px}
button.sec{background:#666}
button.danger{background:#c0392b}
label{font-size:13px;color:#555;margin-top:8px;display:block}
.hidden{display:none!important}
#loginBox{max-width:320px;margin:80px auto;background:#fff;padding:20px;border-radius:8px}
header{background:#1e293b;color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
header .tabs{display:flex;gap:6px;flex-wrap:wrap}
header .tabs button{background:#334155;padding:6px 10px}
header .tabs button.active{background:#2563eb}
#userInfo{font-size:13px}
main{padding:12px;max-width:900px;margin:0 auto}
.card{background:#fff;padding:14px;border-radius:8px;margin-bottom:12px}
.row{border:1px solid #ddd;border-radius:6px;margin-bottom:6px;padding:8px;background:#fff}
.row.tecili{border:2px solid #c0392b}
.row.checked{opacity:.6}
.line{cursor:pointer;font-size:14px}
.line-grid{display:grid;grid-template-columns:90px 1fr 1fr 1fr 80px;gap:8px;align-items:center}
.line-extras{display:flex;gap:8px;align-items:center;margin-top:4px;flex-wrap:wrap}
.details{margin-top:8px;font-size:13px;color:#444;border-top:1px solid #eee;padding-top:8px}
.thumb{width:50px;height:50px;object-fit:cover;border-radius:4px;cursor:pointer}
.small{font-size:12px;color:#666}
.badge{background:#c0392b;color:#fff;border-radius:12px;padding:2px 8px;font-size:12px}
.blurthumb{position:relative;display:inline-block;border-radius:4px;overflow:hidden;vertical-align:middle}
.blurthumb img{display:block}
.blurthumb .bhalf{position:absolute;top:0;right:0;width:50%;height:100%;overflow:hidden}
.blurthumb .bhalf img{width:200%;height:100%;object-fit:cover;margin-left:-100%;filter:blur(6px)}
.blurwrap{position:relative;display:inline-block}
.blurwrap .bhalf{position:absolute;top:0;right:0;width:50%;height:100%;overflow:hidden}
.blurwrap .bhalf img{width:200%;height:100%;object-fit:cover;margin-left:-100%;filter:blur(14px)}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:50;padding:10px}
.modal .box{background:#fff;padding:16px;border-radius:8px;max-width:420px;width:100%;max-height:90vh;overflow:auto}
#viewerModal{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;flex-direction:column;z-index:60}
#viewerModal img{max-width:100%;max-height:80vh;margin:auto}
#viewerModal .bar{display:flex;gap:8px;padding:10px;justify-content:center;flex-wrap:wrap}
</style>
</head>
<body>

<div id="loginBox">
  <h3>Korporativ Giriş</h3>
  <label>İstifadəçi adı</label>
  <input id="loginUser" onkeydown="if(event.key==='Enter') doLogin()">
  <label>Şifrə</label>
  <input id="loginPass" type="password" onkeydown="if(event.key==='Enter') doLogin()">
  <button style="margin-top:12px;width:100%" onclick="doLogin()">Daxil ol</button>
  <div id="loginErr" class="small" style="color:red"></div>
</div>

<div id="app" class="hidden">
<header>
  <div class="tabs" id="navTabs"></div>
  <div id="userInfo"></div>
</header>
<main id="main"></main>
</div>
<div id="modalRoot"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCy5J5pqsD7hLAjzS_MDTByS3avGeXKsE",
  authDomain: "techizatsistemfirebase.firebaseapp.com",
  projectId: "techizatsistemfirebase",
  storageBucket: "techizatsistemfirebase.firebasestorage.app",
  messagingSenderId: "257272547255",
  appId: "1:257272547255:web:54a2c6e0d7d1a80baf0a32"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = JSON.parse(sessionStorage.getItem('korpcu')||'null');
let qaimeler = [];
let curNav = 'medaxil';

// ---- Səhifələmə (Firestore read limitini azaltmaq üçün: hər tabda max 10 qaimə, lazım olanda çəkilir) ----
const PAGE_SIZE = 10;
let pg = {};
async function pgLoad(key, whereFn, page){
  if(!pg[key]) pg[key] = {cursors:[null], mode:null, page:1};
  const st = pg[key]; st.wf = whereFn; st.page = page = page||st.page||1;
  try{
    if(st.mode==='fallback') throw 0;
    for(let p=1;p<=page;p++){
      if(st.cursors[p]!==undefined) continue;
      let q = whereFn().orderBy('createdAt','desc').limit(PAGE_SIZE);
      if(st.cursors[p-1]) q = whereFn().orderBy('createdAt','desc').startAfter(st.cursors[p-1]).limit(PAGE_SIZE);
      const snap = await q.get();
      st.cursors[p] = snap.docs.length ? snap.docs[snap.docs.length-1] : (st.cursors[p-1]||null);
      if(p===page) st.rows = snap.docs.map(d=>({id:d.id,...d.data()}));
    }
    if(st.total==null){ try{ const c = await whereFn().count().get(); st.total = c.data().count; }catch(e){ st.total=st.rows?st.rows.length:0; } }
    st.mode = 'index';
  }catch(e){
    if(!st.all){
      const snap = await whereFn().get();
      st.all = snap.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>(b.createdAt?.toMillis?.()||0)-(a.createdAt?.toMillis?.()||0));
    }
    st.total = st.all.length;
    st.mode = 'fallback';
    st.rows = st.all.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
  }
  render();
}
function pgGoto(key, page){ pgLoad(key, pg[key].wf, page); }
function pgButtons(key){
  const st = pg[key];
  if(!st || !st.total || st.total<=PAGE_SIZE) return '';
  const pages = Math.ceil(st.total/PAGE_SIZE);
  let h = '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px">';
  for(let i=1;i<=pages;i++) h+=`<button class="${st.page===i?'':'sec'}" style="padding:4px 10px" onclick="pgGoto('${key}',${i})">${i}</button>`;
  return h+'</div>';
}
function searchList(key, whereFn, search){
  if(!pg[key] || pg[key].mode!=='search'){
    if(!pg[key]){ pg[key] = {mode:'search'}; whereFn().get().then(snap=>{ pg[key].all = snap.docs.map(d=>({id:d.id,...d.data()})); render(); }); }
  }
  let list = (pg[key] && pg[key].all) || [];
  const s = search.toLowerCase();
  list = list.filter(q=> String(q.no).includes(search) || (q.kimUcun||'').toLowerCase().includes(s) || (q.anbar||'').toLowerCase().includes(s));
  return list.slice().sort((a,b)=>(b.createdAt?.toMillis?.()||0)-(a.createdAt?.toMillis?.()||0));
}
function findQ(id){
  for(const k in pg){ const st=pg[k]; const r=(st.rows&&st.rows.find(x=>x.id===id))||(st.all&&st.all.find(x=>x.id===id)); if(r) return r; }
  return qaimeler.find(x=>x.id===id);
}
function scopedWf(baseWf){
  return currentUser.isKorUser ? ()=> baseWf().where('kimUcunId','==',currentUser.korUserId) : baseWf;
}

function isIlyas(){ return currentUser && currentUser.username === 'ilyas'; }
function myScope(list){ return currentUser.isKorUser ? list.filter(q=>q.kimUcunId===currentUser.korUserId) : list; }
function shouldBlur(){ return !isIlyas(); }
function fmtDate(ts){ if(!ts) return ''; const d = ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString('az-AZ')+' '+d.toLocaleTimeString('az-AZ',{hour:'2-digit',minute:'2-digit'}); }
function daysAgo(ts){ if(!ts) return 0; const d=ts.toDate?ts.toDate():new Date(ts); return (Date.now()-d.getTime())/86400000; }
function isTecili(q){ return q.status!=='medaxil' && (q.tecili===true || (q.status==='yeni' && daysAgo(q.createdAt)>3)); }
function statusLabel(s){ return s==='yeni'?'Yeni':(s==='islemede'?'İşlənir':(s==='sorgu'?'Sorğuda':(s==='tesdiqlenib'?'Təsdiq edilib':'Mədaxil edildi'))); }
function dlUrl(u){ return u.replace('/upload/','/upload/fl_attachment/'); }
function printImage(url){
  let f = document.getElementById('printFrame');
  if(!f){ f = document.createElement('iframe'); f.id='printFrame'; f.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0'; document.body.appendChild(f); }
  const doc = f.contentWindow.document;
  doc.open();
  doc.write(`<html><head><style>@page{margin:0}html,body{margin:0;height:100%}body{display:flex;align-items:center;justify-content:center}img{max-width:100vw;max-height:100vh;object-fit:contain}</style></head><body><img src="${url}" onload="setTimeout(()=>{window.focus();window.print();},200)"></body></html>`);
  doc.close();
}
function photoThumb(url, allPhotos, size, blurable){
  size = size || 50;
  if(blurable===undefined) blurable = true;
  const idx = allPhotos.indexOf(url);
  const openCall = `openViewer(${JSON.stringify(allPhotos).replace(/"/g,'&quot;')},${idx},${blurable})`;
  if(!blurable || !shouldBlur()){
    return `<img class="thumb" src="${url}" onclick="event.stopPropagation();${openCall}">`;
  }
  return `<span class="thumb blurthumb" style="width:${size}px;height:${size}px" onclick="event.stopPropagation();${openCall}">
    <img src="${url}" style="width:100%;height:100%;object-fit:cover">
    <span class="bhalf"><img src="${url}"></span>
  </span>`;
}

async function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  let kUser = null;
  const kSnap = await db.collection('korusers').doc(u).get();
  if(kSnap.exists) kUser = {id:kSnap.id, name:kSnap.data().name};
  else{
    const nameSnap = await db.collection('korusers').where('name','==',u).limit(1).get();
    if(!nameSnap.empty) kUser = {id:nameSnap.docs[0].id, name:nameSnap.docs[0].data().name};
  }
  if(kUser && p==='7777'){
    currentUser = {username:kUser.id, name:kUser.name, isKorUser:true, korUserId:kUser.id};
    sessionStorage.setItem('korpcu', JSON.stringify(currentUser));
    boot();
    return;
  }
  const snap = await db.collection('users').doc(u).get();
  const d = snap.exists ? snap.data() : null;
  const roles = d ? (d.roles || (d.role?[d.role]:[])) : [];
  if(!d || d.password !== p || !roles.includes('korporativ')){
    document.getElementById('loginErr').innerText = 'İstifadəçi adı və ya şifrə yanlışdır';
    return;
  }
  currentUser = {username:u, name:d.name};
  sessionStorage.setItem('korpcu', JSON.stringify(currentUser));
  boot();
}
function logout(){ sessionStorage.removeItem('korpcu'); location.href = 'index.html'; }

function boot(){
  if(!currentUser) return;
  document.getElementById('loginBox').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('userInfo').innerText = currentUser.name + ' çıxış';
  document.getElementById('userInfo').style.cursor='pointer';
  document.getElementById('userInfo').onclick = logout;
  document.getElementById('navTabs').innerHTML = [['yeni','Yeni'],['medaxil','Mədaxil Olunub'],['islemede','İşlənilir'],['sorgu','Sorğudadır'],['tesdiqlenib','Təsdiq edilib'],['istehsalat','İstehsalat']]
    .map(t=>`<button data-n="${t[0]}" onclick="setNav('${t[0]}')">${t[1]}</button>`).join('');
  setupPush(db, currentUser.username, currentUser.isKorUser?'korusers':undefined);
  render();
}
if(currentUser) boot();

function setNav(n){ curNav = n; render(); }

function render(){
  const af = document.activeElement;
  const afId = af && af.id, afStart = af && af.selectionStart, afEnd = af && af.selectionEnd;
  document.querySelectorAll('#navTabs button').forEach(b=>b.classList.toggle('active', b.dataset.n===curNav));
  document.getElementById('main').innerHTML = curNav==='yeni' ? viewYeni() : (curNav==='medaxil' ? viewMedaxil() : (curNav==='istehsalat' ? viewIstehsalat() : viewIslemede(curNav)));
  if(afId){ const el=document.getElementById(afId); if(el){ el.focus(); if(afStart!=null) try{el.setSelectionRange(afStart,afEnd);}catch(e){} } }
}

function viewYeni(){
  const search = document.getElementById('korpSearch4')?.value || '';
  const wf = scopedWf(()=> db.collection('qaimeler').where('status','==','yeni'));
  let list, pager='';
  if(search){ list = searchList('kp_yeni_search', wf, search); }
  else{ if(!pg['kp_yeni']) pgLoad('kp_yeni', wf); list = (pg['kp_yeni']&&pg['kp_yeni'].rows)||[]; pager = pgButtons('kp_yeni'); }
  list = list.filter(q=>q.qType!=='istehsalat');
  return `<div class="card">
    <h3>Yeni (işlənməyi gözləyir)</h3>
    <input id="korpSearch4" placeholder="Axtar (ad / qaimə № / anbar)" value="${search}" oninput="render()">
    <div class="line-grid small" style="font-weight:bold;padding:4px 8px;margin-top:10px">
      <span>Qaimə</span><span>Anbar</span><span>Kim üçün</span><span>Sifarişçi</span><span>Tarix</span>
    </div>
    ${list.map(q=>rowYeni(q)).join('') || '<div class="small">Yoxdur</div>'}
    ${pager}
  </div>`;
}
function rowYeni(q){
  const orig = q.photos||[];
  return `<div class="row ${isTecili(q)?'tecili':''}">
    <div class="line-grid">
      <span><b>Qaimə_${q.no}</b></span>
      <span>${q.anbar}</span>
      <span>${q.kimUcun}</span>
      <span>${q.sifarisVeren||''}</span>
      <span class="small">${fmtDate(q.createdAt)}</span>
    </div>
    <div class="line-extras">${orig[0]?photoThumb(orig[0],orig):''}</div>
  </div>`;
}

function viewMedaxil(){
  const search = document.getElementById('korpSearch')?.value || '';
  const wf = scopedWf(()=> db.collection('qaimeler').where('status','==','medaxil'));
  let list, pager='';
  if(search){ list = searchList('kp_medaxil_search', wf, search); }
  else{ if(!pg['kp_medaxil']) pgLoad('kp_medaxil', wf); list = (pg['kp_medaxil']&&pg['kp_medaxil'].rows)||[]; pager = pgButtons('kp_medaxil'); }
  list = list.filter(q=>q.qType!=='istehsalat');
  return `<div class="card">
    <h3>Mədaxil Olunmuş Qaimlər</h3>
    <input id="korpSearch" placeholder="Axtar (ad / qaimə № / anbar)" value="${search}" oninput="render()">
    <div class="line-grid small" style="font-weight:bold;padding:4px 8px;margin-top:10px">
      <span>Qaimə</span><span>Anbar</span><span>Kim üçün</span><span>İşləyən</span><span>Mədaxil №</span>
    </div>
    ${list.map(q=>rowHtml(q)).join('') || '<div class="small">Yoxdur</div>'}
    ${pager}
  </div>`;
}
function rowHtml(q){
  const orig = q.photos||[];
  const med = q.medaxilPhotos||[];
  const origThumb = orig[0] ? `<span><span class="small">Sifariş:</span> ${photoThumb(orig[0], orig)}</span>` : '';
  const medThumb = med[0] ? `<span><span class="small">Mədaxil:</span> ${photoThumb(med[0], med, 50, false)}</span>` : '<span class="small">mədaxil şəkli yoxdur</span>';
  const checked = q.korpChecked===true;
  return `<div class="row ${isTecili(q)?'tecili':''} ${checked?'checked':''}">
    <div class="line" onclick="toggleDetails('${q.id}')">
      <div class="line-grid">
        <span><b>Qaimə_${q.no}</b></span>
        <span>${q.anbar}</span>
        <span>${q.kimUcun}</span>
        <span>${q.isleyen||''}</span>
        <span>${q.medaxilNo||''}</span>
      </div>
      <div class="line-extras">
        ${origThumb}${medThumb}
        ${checked?'<span class="badge" style="background:#16a34a">✓ Yoxlanılıb</span>':''}
      </div>
    </div>
    <div class="details hidden" id="det_${q.id}">
      <div>Tarix: ${fmtDate(q.createdAt)}</div>
      <div>Sifarişçi: ${q.sifarisVeren}</div>
      <div>Kim işlədi: ${q.isleyen||'—'}</div>
      <div>Mədaxil №: ${q.medaxilNo||'—'}</div>
      ${(q.korpMessages && q.korpMessages.length) ? '<div class="small">Problem bildirilib</div>' : `<button class="danger" style="margin-top:6px" onclick="openProblemModal('${q.id}')">Problem bildir</button>`}
      <label style="display:flex;align-items:center;gap:6px;width:auto;margin-top:8px">
        <input type="checkbox" style="width:auto" ${checked?'checked':''} onchange="toggleChecked('${q.id}',this.checked)"> Yoxlanıldı (bu qaimə şirkət sistemində yoxlanılıb)
      </label>
    </div>
  </div>`;
}
async function toggleChecked(id, val){
  await db.collection('qaimeler').doc(id).update({korpChecked: val});
}
function toggleDetails(id){ document.getElementById('det_'+id).classList.toggle('hidden'); }

function viewIslemede(st){
  const titles = {islemede:'İşlənilir', sorgu:'Sorğudadır', tesdiqlenib:'Təsdiq edilib'};
  const key = 'kp_'+st;
  const search = document.getElementById('korpSearch2')?.value || '';
  const wf = scopedWf(()=> db.collection('qaimeler').where('status','==',st));
  let list, pager='';
  if(search){ list = searchList(key+'_search', wf, search); }
  else{ if(!pg[key]) pgLoad(key, wf); list = (pg[key]&&pg[key].rows)||[]; pager = pgButtons(key); }
  list = list.filter(q=>q.qType!=='istehsalat').slice().sort((a,b)=> (b.tookAt?.toMillis?.()||0)-(a.tookAt?.toMillis?.()||0));
  return `<div class="card">
    <h3>${titles[st]}</h3>
    <input id="korpSearch2" placeholder="Axtar (ad / qaimə № / anbar)" value="${search}" oninput="render()">
    <div class="line-grid small" style="font-weight:bold;padding:4px 8px;margin-top:10px">
      <span>Qaimə</span><span>Anbar</span><span>Kim üçün</span><span>İşləyən</span><span>Tarix</span>
    </div>
    ${list.map(q=>rowIslemede(q)).join('') || '<div class="small">Yoxdur</div>'}
    ${pager}
  </div>`;
}
function rowIslemede(q){
  const orig = q.photos||[];
  return `<div class="row ${isTecili(q)?'tecili':''}">
    <div class="line-grid">
      <span><b>Qaimə_${q.no}</b></span>
      <span>${q.anbar}</span>
      <span>${q.kimUcun}</span>
      <span>${q.isleyen||''}</span>
      <span class="small">${statusLabel(q.status)}</span>
    </div>
    <div class="line-extras">${orig[0]?photoThumb(orig[0],orig):''}</div>
  </div>`;
}

function viewIstehsalat(){
  const search = document.getElementById('korpSearch3')?.value || '';
  const wf = scopedWf(()=> db.collection('qaimeler').where('qType','==','istehsalat'));
  let list, pager='';
  if(search){ list = searchList('kp_istehsalat_search', wf, search); }
  else{ if(!pg['kp_istehsalat']) pgLoad('kp_istehsalat', wf); list = (pg['kp_istehsalat']&&pg['kp_istehsalat'].rows)||[]; pager = pgButtons('kp_istehsalat'); }
  return `<div class="card">
    <h3>İstehsalat Qaimləri</h3>
    <input id="korpSearch3" placeholder="Axtar (ad / qaimə № / anbar)" value="${search}" oninput="render()">
    <div class="line-grid small" style="font-weight:bold;padding:4px 8px;margin-top:10px">
      <span>Qaimə</span><span>Anbar</span><span>Kim üçün</span><span>İşləyən</span><span>Status</span>
    </div>
    ${list.map(q=>rowHtml(q)).join('') || '<div class="small">Yoxdur</div>'}
    ${pager}
  </div>`;
}

function openProblemModal(id){
  document.getElementById('modalRoot').innerHTML = `<div class="modal"><div class="box">
    <h3>Problem bildir</h3>
    <label>Ad *</label>
    <input id="pmAd">
    <label>Problem *</label>
    <textarea id="pmText" rows="3"></textarea>
    <div id="pmErr" class="small" style="color:red"></div>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button class="sec" onclick="closeModal()">Ləğv et</button>
      <button onclick="sendProblem('${id}')">Göndər</button>
    </div>
  </div></div>`;
}
async function sendProblem(id){
  const ad = document.getElementById('pmAd').value.trim();
  const text = document.getElementById('pmText').value.trim();
  const err = document.getElementById('pmErr');
  if(!ad || !text){ err.innerText='Ad və problem mütləqdir'; return; }
  const q = findQ(id);
  if(q.korpMessages && q.korpMessages.length){ err.innerText='Bu qaimə üçün artıq problem bildirilib'; return; }
  await db.collection('qaimeler').doc(id).update({
    korpMessages: firebase.firestore.FieldValue.arrayUnion({ad, text, solved:false, createdAt:new Date().toISOString()})
  });
  if(q.isleyen) sendPushToName(db, q.isleyen, 'Korporativdən problem', `Qaimə_${q.no} (${ad}): ${text}`);
  closeModal();
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

function openViewer(photos, idx, blurable){
  let rotate=0, scale=1, pinchDist=null;
  if(blurable===undefined) blurable = true;
  const blur = blurable && shouldBlur();
  document.getElementById('modalRoot').innerHTML = `<div id="viewerModal">
    <div class="bar">
      <button class="sec" onclick="closeModal()">Bağla</button>
      <button id="vPrev">◀</button>
      <span id="vCount" style="color:#fff;align-self:center"></span>
      <button id="vNext">▶</button>
      <button id="vRotate">⟳ Döndər</button>
      <button id="vPrint">🖨 Çap et</button>
      <a id="vDl"><button>Yüklə</button></a>
    </div>
    <div id="vWrap" style="flex:1;overflow:hidden;display:flex;touch-action:none">
      <span id="vImgWrap" class="${blur?'blurwrap':''}" style="margin:auto">
        <img id="vImg" style="max-width:100%;max-height:80vh;display:block">
        ${blur?'<span class="bhalf"><img id="vBlurImg"></span>':''}
      </span>
    </div>
  </div>`;
  document.getElementById('vPrint').onclick = ()=> printImage(photos[idx]);
  const img = document.getElementById('vImg');
  const blurImg = document.getElementById('vBlurImg');
  const imgWrap = document.getElementById('vImgWrap');
  function update(){
    img.src = photos[idx];
    if(blurImg) blurImg.src = photos[idx];
    imgWrap.style.transform = `rotate(${rotate}deg) scale(${scale})`;
    document.getElementById('vCount').innerText = (idx+1)+'/'+photos.length;
    document.getElementById('vDl').href = dlUrl(photos[idx]);
  }
  document.getElementById('vPrev').onclick=()=>{ idx=(idx-1+photos.length)%photos.length; rotate=0;scale=1; update(); };
  document.getElementById('vNext').onclick=()=>{ idx=(idx+1)%photos.length; rotate=0;scale=1; update(); };
  document.getElementById('vRotate').onclick=()=>{ rotate=(rotate+90)%360; update(); };
  const wrap = document.getElementById('vWrap');
  wrap.addEventListener('wheel', e=>{ e.preventDefault(); scale=Math.max(0.5,Math.min(5,scale+(e.deltaY<0?0.15:-0.15))); imgWrap.style.transform=`rotate(${rotate}deg) scale(${scale})`; }, {passive:false});
  wrap.addEventListener('touchmove', e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.hypot(dx,dy);
      if(pinchDist!=null){ scale=Math.max(0.5,Math.min(5,scale*(dist/pinchDist))); imgWrap.style.transform=`rotate(${rotate}deg) scale(${scale})`; }
      pinchDist=dist;
    }
  }, {passive:false});
  wrap.addEventListener('touchend', ()=>{ pinchDist=null; });
  update();
}
</script>
</body>
</html>
